# Honcho Self-Hosted - Dokploy Deployment
# Adapted from https://github.com/plastic-labs/honcho

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dokploy-network
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY}
      - AUTH_USE_AUTH=false
      - LOG_LEVEL=INFO
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.honcho.rule=Host(`honcho.${DOMAIN}`)"
      - "traefik.http.routers.honcho.entrypoints=websecure"
      - "traefik.http.routers.honcho.tls.certresolver=letsencrypt"
      - "traefik.http.services.honcho.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  deriver:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dokploy-network
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@database:5432/postgres
      - CACHE_URL=redis://redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - LLM_OPENAI_API_KEY=${LLM_OPENAI_API_KEY}
      - AUTH_USE_AUTH=false
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    networks:
      - dokploy-network
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8.2
    restart: unless-stopped
    networks:
      - dokploy-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redis-data:

networks:
  dokploy-network:
    external: true
